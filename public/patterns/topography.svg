<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <pattern id="topo" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="100" cy="100" r="70" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="100" cy="100" r="50" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="100" cy="100" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="200" cy="0" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="0" cy="200" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
      <circle cx="200" cy="200" r="30" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#topo)"/>
</svg>
